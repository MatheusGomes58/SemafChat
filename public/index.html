<!DOCTYPE html>
    <head>
        <title>SemafChat | Login</title>
        <!--carrega a nossa biblioteca do tipo css-->
        <link rel="realstyle" href="./css/main.css">

        <!--carrega a funcao que permite caracteres especiais-->
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        
        <!--inicializa as bibliotecas do bootstrap-->
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-1BmE4kWBq78iYhFldvKuhfTAU6auU8tT94WrHftjDbrCEXSU1oBoqyl2QvZ6jIW3" crossorigin="anonymous">
        
        <!--inicializa as bibliotecas do sweet alert-->
        <script src="https://unpkg.com/sweetalert2@9/dist/sweetalert2.all.js"></script>
        
        <!--inicializa as bibliotecas de textoi do google-->
        <link href="https://fonts.googleapis.com/css?family=Open+Sans:300,400,700" rel="stylesheet">
    </head>
    <body>
        <br>
        <center>
            <!--cria o card para coletar o logim e senha-->
            <div class="card col-4" style="border-radius: 3%;">
                <div class="card-header">
                    Área de login
                </div>
                <div class="card-body">
                    <input type="text" id="login" class="form-control" placeholder="Login"/><br>
                    <input type="password" id="password" class="form-control" placeholder="Senha"/><br>
                    <button type="button" class="btn btn-outline-primary" onclick="login()">Entrar</button>
                </div>
            </div>
        </center>
        
        <!--carrega as bibliotecas do bootstrap no projeto-->
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-ka7Sk0Gln4gmtz2MlQnikT1wXgYsOg+OMhuP+IlRH9sENBO0LRn5q+8nbTov4+1p" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.10.2/dist/umd/popper.min.js" integrity="sha384-7+zCNj/IqJ95wo16oMtfsKbZ9ccEh31eOz1HGyDuCQ6wgnyJNSYdrPa03rtR1zdB" crossorigin="anonymous"></script>
        <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.min.js" integrity="sha384-QJHtvGhmr9XOIpI6YVutG+2QOK9T+ZnN4kzFN1RtK3zEFEIsxhlmWl5/YESvpZ13" crossorigin="anonymous"></script>
        
        <!--carrega as bibliotecas do firebase no projeto-->
        <script src="https://www.gstatic.com/firebasejs/7.19.1/firebase-app.js"></script>
        <script src="https://www.gstatic.com/firebasejs/7.19.1/firebase-auth.js"></script>

        <!--inicializa nossa biblioteca javascript-->
        <script src="./js/mains.js"></script>
    </body>
</html>
